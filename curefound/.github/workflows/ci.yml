name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # --------------------------------------------------------------------
  # Lint + tests on the Python backend
  # --------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.115" "uvicorn[standard]>=0.32" "pydantic>=2.7" \
            "pydantic-settings>=2.5" "numpy>=1.26,<2.3" "networkx>=3.2" \
            "structlog>=24" "asgi-correlation-id>=4" "httpx>=0.27" \
            pytest pytest-asyncio ruff

      - name: Ruff lint
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Pytest (regression + smoke + unit)
        run: |
          pytest tests/regression tests/unit tests/integration -q --tb=short
        env:
          PYTHONIOENCODING: utf-8

  # --------------------------------------------------------------------
  # Frontend build + bundle-size guard
  # --------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund
      - run: npm run build

      - name: Verify dist exists
        run: test -f dist/index.html && test -d dist/assets

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # --------------------------------------------------------------------
  # Production Docker image build (and push to GHCR on `main`)
  # --------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/curefound:latest
            ghcr.io/${{ github.repository_owner }}/curefound:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
