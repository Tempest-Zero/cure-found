# ============================================================================
# CureFound — Docker Compose
#
# Phase 1 service surface:
#   neo4j   — graph database (Bolt + Browser); always present.
#   backend — FastAPI app (added in Phase 1 Step 5, see comment block below).
#
# Quick start (Neo4j only, for local KG_BACKEND=networkx dev):
#   docker compose up -d neo4j
#
# Full stack (Phase 1+):
#   cp .env.example .env   # then edit NEO4J_PASSWORD at minimum
#   docker compose up
#
# Tear down + wipe volumes:
#   docker compose down -v
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Neo4j 5 Community — graph store
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: curefound_neo4j
    environment:
      # Credentials mirror the .env.example defaults so `docker compose up`
      # works without touching anything. Change in .env before staging/prod.
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changethis_dev_only}"
      # JVM heap limit — keep at 2G for a 16 GB dev box; raise for full PrimeKG.
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-2G}"
      NEO4J_server_memory_pagecache_size: "1G"
      # Disable anonymous usage-data reporting.
      NEO4J_dbms_usage__report_enabled: "false"
    volumes:
      # Named volumes survive `docker compose down` but not `down -v`.
      - neo4j-data:/data
      - neo4j-logs:/logs
      # Init Cypher (constraints + indexes) applied by our startup helper.
      # Read-only mount — the file is managed in git, not written at runtime.
      - ./docker/neo4j/init.cypher:/var/lib/neo4j/conf/import/init.cypher:ro
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt
    healthcheck:
      # wget is available in the neo4j image; curl is not.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Backend — FastAPI app
  # Uncommented in Phase 1 Step 5 once neo4j_backend.py is implemented and
  # docker/Dockerfile.backend is complete.
  # --------------------------------------------------------------------------
  # backend:
  #   build:
  #     context: .
  #     dockerfile: docker/Dockerfile.backend
  #   container_name: curefound_backend
  #   env_file: .env
  #   environment:
  #     # Override inside-container paths; data/ is bind-mounted below.
  #     DATA_DIR: /app/data
  #     SEED_KG_PATH: /app/data/seed/kg.json
  #     ARTIFACTS_DIR: /app/data/artifacts
  #     RAW_DIR: /app/data/raw
  #     # Point at the Neo4j service by its Compose service name.
  #     NEO4J_URI: bolt://neo4j:7687
  #     RELOAD: "0"
  #   depends_on:
  #     neo4j:
  #       condition: service_healthy
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     # Bind-mount data/ so the container can read seed KG and write eval
  #     # artifacts without rebuilding the image.
  #     - ./data:/app/data
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 20s
  #   restart: unless-stopped

# --------------------------------------------------------------------------
# Named volumes
# --------------------------------------------------------------------------
volumes:
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
